global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: traefik
    static_configs:
      - targets:
          - traefik:8082

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: backend

  - job_name: ai-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - ai-service:8000
        labels:
          service: ai-service

  - job_name: browser-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - browser-worker:8081
        labels:
          service: browser-worker

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets:
          - alloy:12345
