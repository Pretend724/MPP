name: mpp-dev

services:
  traefik:
    profiles:
      - gateway

  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      BACKEND_API_BASE_URL: http://backend:8080
      PORT: "3000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    develop:
      watch:
        - action: rebuild
          path: ../frontend/package.json
        - action: rebuild
          path: ../frontend/pnpm-lock.yaml

  backend:
    build:
      target: dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      ENABLE_DEV_SEED: "true"
    volumes:
      - ../backend:/app
      - backend_go_cache:/go/pkg/mod
      - backend_go_build_cache:/root/.cache/go-build
    develop:
      watch:
        - action: rebuild
          path: ../backend/go.mod
        - action: rebuild
          path: ../backend/go.sum

  browser-worker:
    build:
      target: dev
    ports:
      - "8081:8081"
    environment:
      APP_ENV: development
    volumes:
      - ../browser-worker:/app
      - browser_worker_go_cache:/go/pkg/mod
      - browser_worker_go_build_cache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
    develop:
      watch:
        - action: rebuild
          path: ../browser-worker/go.mod
        - action: rebuild
          path: ../browser-worker/go.sum

  ai-service:
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ../ai-service:/app
      - ai_service_venv:/app/.venv
      - ai_service_uv_cache:/root/.cache/uv
    develop:
      watch:
        - action: rebuild
          path: ../ai-service/pyproject.toml
        - action: rebuild
          path: ../ai-service/uv.lock

  db:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  frontend_node_modules:
  frontend_next:
  backend_go_cache:
  backend_go_build_cache:
  browser_worker_go_cache:
  browser_worker_go_build_cache:
  ai_service_venv:
  ai_service_uv_cache:
