name: mpp

services:
  traefik:
    image: traefik:v3.7
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      frontend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1}
    env_file: .env
    environment:
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-web.entrypoints=web
      - traefik.http.routers.frontend-web.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend-web.middlewares=mpp-gateway-ratelimit@docker
      - traefik.http.routers.frontend-websecure.entrypoints=websecure
      - traefik.http.routers.frontend-websecure.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend-websecure.tls=true
      - traefik.http.routers.frontend-websecure.middlewares=mpp-gateway-ratelimit@docker
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.average=${TRAEFIK_RATE_LIMIT_AVERAGE:-100}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.period=${TRAEFIK_RATE_LIMIT_PERIOD:-1s}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.burst=${TRAEFIK_RATE_LIMIT_BURST:-200}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.redis.endpoints=${TRAEFIK_RATE_LIMIT_REDIS_ENDPOINTS:-redis:6379}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.redis.password=${REDIS_PASSWORD:-}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.redis.db=${TRAEFIK_RATE_LIMIT_REDIS_DB:-0}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      BROWSER_WORKER_URL: ${BROWSER_WORKER_URL:-http://browser-worker:8081}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      browser-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - default
      - browser-runtime

  browser-worker:
    build:
      context: ../browser-worker
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      DOCKER_HOST: unix:///var/run/docker.sock
      BROWSER_RUNTIME_IMAGE: ${BROWSER_RUNTIME_IMAGE:-mpp-browser-runtime}
      BROWSER_RUNTIME_NETWORK: ${BROWSER_RUNTIME_NETWORK:-mpp-browser-runtime}
      BROWSER_RUNTIME_BIND_IP: 0.0.0.0
      BROWSER_RUNTIME_HOST: ${BROWSER_RUNTIME_HOST:-host.docker.internal}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      browser-runtime-image:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - default
      - browser-runtime

  browser-runtime-image:
    image: ${BROWSER_RUNTIME_IMAGE:-mpp-browser-runtime}
    build:
      context: ../browser-worker/runtime
      dockerfile: Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - sleep infinity

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-poster_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    env_file: .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  browser-runtime:
    name: ${BROWSER_RUNTIME_NETWORK:-mpp-browser-runtime}
