name: mpp

services:
  traefik:
    image: traefik:v3.7
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.metrics.address=:8082
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      frontend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1}
    env_file: .env
    environment:
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-web.entrypoints=web
      - traefik.http.routers.frontend-web.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend-web.middlewares=mpp-gateway-ratelimit@docker
      - traefik.http.routers.frontend-websecure.entrypoints=websecure
      - traefik.http.routers.frontend-websecure.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend-websecure.tls=true
      - traefik.http.routers.frontend-websecure.middlewares=mpp-gateway-ratelimit@docker
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.average=${TRAEFIK_RATE_LIMIT_AVERAGE:-100}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.period=${TRAEFIK_RATE_LIMIT_PERIOD:-1s}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.burst=${TRAEFIK_RATE_LIMIT_BURST:-200}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.redis.endpoints=${TRAEFIK_RATE_LIMIT_REDIS_ENDPOINTS:-redis:6379}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.redis.password=${REDIS_PASSWORD:-}
      - traefik.http.middlewares.mpp-gateway-ratelimit.ratelimit.redis.db=${TRAEFIK_RATE_LIMIT_REDIS_DB:-0}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    scale: ${BACKEND_API_REPLICAS:-2}
    env_file: .env
    environment:
      BACKEND_PROCESS_ROLE: api
      BACKEND_REQUIRE_REDIS: ${BACKEND_REQUIRE_REDIS:-true}
      DB_HOST: ${DB_HOST:-db}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-10}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-30m}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-5m}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      BROWSER_WORKER_URL: ${BROWSER_WORKER_URL:-http://browser-worker:8081}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      browser-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - default
      - browser-runtime

  publish-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      BACKEND_PROCESS_ROLE: worker
      BACKEND_REQUIRE_REDIS: ${BACKEND_REQUIRE_REDIS:-true}
      DB_HOST: ${DB_HOST:-db}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-10}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-30m}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-5m}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      BROWSER_WORKER_URL: ${BROWSER_WORKER_URL:-http://browser-worker:8081}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      browser-worker:
        condition: service_healthy
    # No healthcheck: this worker role does not expose an HTTP readiness endpoint.
    networks:
      - default
      - browser-runtime

  browser-worker:
    build:
      context: ../browser-worker
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      DOCKER_HOST: unix:///var/run/docker.sock
      BROWSER_RUNTIME_IMAGE: ${BROWSER_RUNTIME_IMAGE:-mpp-browser-runtime}
      BROWSER_RUNTIME_NETWORK: ${BROWSER_RUNTIME_NETWORK:-mpp-browser-runtime}
      BROWSER_RUNTIME_BIND_IP: 0.0.0.0
      BROWSER_RUNTIME_HOST: ${BROWSER_RUNTIME_HOST:-host.docker.internal}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      browser-runtime-image:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - default
      - browser-runtime

  browser-runtime-image:
    image: ${BROWSER_RUNTIME_IMAGE:-mpp-browser-runtime}
    build:
      context: ../browser-worker/runtime
      dockerfile: Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - sleep infinity

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-poster_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    env_file: .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - publish-worker
      - ai-service
      - browser-worker

  loki:
    image: grafana/loki:3.7.0
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  alloy:
    image: grafana/alloy:v1.16.1
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:13.0.1-ubuntu
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  alloy_data:
  grafana_data:

networks:
  browser-runtime:
    name: ${BROWSER_RUNTIME_NETWORK:-mpp-browser-runtime}
