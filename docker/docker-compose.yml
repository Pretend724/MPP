name: mpp

services:
  traefik:
    image: traefik:v3.7
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - frontend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1}
    env_file: .env
    depends_on:
      - backend
      - ai-service
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-web.entrypoints=web
      - traefik.http.routers.frontend-web.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend-websecure.entrypoints=websecure
      - traefik.http.routers.frontend-websecure.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend-websecure.tls=true
      - traefik.http.services.frontend.loadbalancer.server.port=3000

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      BROWSER_WORKER_URL: ${BROWSER_WORKER_URL:-http://browser-worker:8081}
    depends_on:
      - db
      - redis
      - browser-worker
    networks:
      - default
      - browser-runtime

  browser-worker:
    build:
      context: ../browser-worker
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      DOCKER_HOST: unix:///var/run/docker.sock
      BROWSER_RUNTIME_IMAGE: ${BROWSER_RUNTIME_IMAGE:-mpp-browser-runtime}
      BROWSER_RUNTIME_NETWORK: ${BROWSER_RUNTIME_NETWORK:-mpp-browser-runtime}
      BROWSER_RUNTIME_BIND_IP: 0.0.0.0
      BROWSER_RUNTIME_HOST: ${BROWSER_RUNTIME_HOST:-host.docker.internal}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - browser-runtime-image
    networks:
      - default
      - browser-runtime

  browser-runtime-image:
    image: ${BROWSER_RUNTIME_IMAGE:-mpp-browser-runtime}
    build:
      context: ../browser-worker/runtime
      dockerfile: Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - sleep infinity

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    env_file: .env

  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-poster_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    env_file: .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  browser-runtime:
    name: ${BROWSER_RUNTIME_NETWORK:-mpp-browser-runtime}
