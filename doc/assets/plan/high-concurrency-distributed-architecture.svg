<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" role="img" aria-labelledby="title desc">
  <title id="title">MPP 高并发与分布式架构演进图</title>
  <desc id="desc">四层架构图：公网入口、应用服务、异步执行、数据与可观测性。</desc>
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif;
    }
    .page-title { fill: #111827; font-size: 25px; font-weight: 700; }
    .page-subtitle { fill: #6b7280; font-size: 13px; }
    .layer-label { fill: #6b7280; font-size: 11px; font-weight: 700; letter-spacing: .08em; }
    .node-title { fill: #111827; font-size: 15px; font-weight: 700; }
    .node-subtitle { fill: #6b7280; font-size: 12px; }
    .small { fill: #6b7280; font-size: 11px; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .request { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow-request); }
    .async { stroke: #9333ea; stroke-width: 2.2; fill: none; marker-end: url(#arrow-async); }
    .data { stroke: #16a34a; stroke-width: 2; fill: none; marker-end: url(#arrow-data); }
    .telemetry { stroke: #f97316; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-telemetry); }
    .rail { stroke: #9ca3af; stroke-width: 1.6; fill: none; stroke-dasharray: 7 5; }
  </style>
  <defs>
    <marker id="arrow-request" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arrow-async" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#9333ea"/>
    </marker>
    <marker id="arrow-data" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#16a34a"/>
    </marker>
    <marker id="arrow-telemetry" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="48" y="46" class="page-title">MPP 高并发与分布式架构演进图</text>
  <text x="48" y="69" class="page-subtitle">主请求链路、异步发布链路、数据协调和观测能力分层展示</text>

  <rect x="40" y="92" width="1180" height="132" rx="10" fill="#eff6ff" fill-opacity=".55" stroke="#bfdbfe" stroke-width="1.2" stroke-dasharray="7 5"/>
  <text x="58" y="116" class="layer-label">EDGE AND PUBLIC ENTRY</text>

  <rect x="40" y="252" width="1180" height="122" rx="10" fill="#f0fdfa" fill-opacity=".58" stroke="#99f6e4" stroke-width="1.2" stroke-dasharray="7 5"/>
  <text x="58" y="276" class="layer-label">APPLICATION SERVICES</text>

  <rect x="40" y="412" width="1180" height="118" rx="10" fill="#faf5ff" fill-opacity=".64" stroke="#d8b4fe" stroke-width="1.2" stroke-dasharray="7 5"/>
  <text x="58" y="436" class="layer-label">ASYNC PUBLISHING</text>

  <rect x="40" y="580" width="1180" height="110" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="7 5"/>
  <text x="58" y="604" class="layer-label">DATA AND INFRASTRUCTURE</text>

  <g transform="translate(72 134)">
