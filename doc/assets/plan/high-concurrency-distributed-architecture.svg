    <circle cx="36" cy="29" r="17" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.4"/>
    <path d="M23 29h26M36 16c7 8 7 18 0 26M36 16c-7 8-7 18 0 26" stroke="#2563eb" stroke-width="1.2" fill="none"/>
    <text x="102" y="25" text-anchor="middle" class="node-title">CDN</text>
    <text x="102" y="43" text-anchor="middle" class="node-subtitle">静态缓存</text>
  </g>

