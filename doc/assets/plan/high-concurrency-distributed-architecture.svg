    <rect x="14" y="0" width="220" height="54" fill="#faf5ff"/>
    <line x1="14" y1="0" x2="234" y2="0" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="14" y1="54" x2="234" y2="54" stroke="#c084fc" stroke-width="1.5"/>
    <ellipse cx="234" cy="27" rx="9" ry="27" fill="#ffffff" stroke="#c084fc" stroke-width="1.5"/>
