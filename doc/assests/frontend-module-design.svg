<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720" role="img">

  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .section-title { font-size: 14px; font-weight: 700; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-line { font-size: 12px; fill: #6b7280; }
    .edge-label { font-size: 11px; font-weight: 600; fill: #374151; }
    .section { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.4; stroke-dasharray: 7 5; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .gray { fill: #f9fafb; stroke: #d1d5db; }
    .request { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
    .data { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
    .async { stroke: #dc2626; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-red); }
    .ai { stroke: #9333ea; stroke-width: 2.2; fill: none; marker-end: url(#arrow-purple); }
    .browser { stroke: #ea580c; stroke-width: 2.2; fill: none; marker-end: url(#arrow-orange); }
    .muted { stroke: #9ca3af; stroke-width: 1.8; fill: none; marker-end: url(#arrow-gray); }
  </style>


  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
