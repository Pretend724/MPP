<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Remote Browser Session Architecture</title>
  <desc id="desc">User interacts with the frontend, backend coordinates a browser worker, and the worker controls an ephemeral Chromium container over private CDP while streaming noVNC through an authenticated backend proxy.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="136%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #dbe3ea; stroke-width: 1.5; rx: 16; }
      .group-title { fill: #334155; font: 700 15px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.7; rx: 10; filter: url(#shadow); }
      .box-blue { fill: #eaf4ff; stroke: #2563eb; }
      .box-green { fill: #ebf8f1; stroke: #15803d; }
      .box-amber { fill: #fff7ed; stroke: #d97706; }
      .box-red { fill: #fff1f2; stroke: #e11d48; }
      .label { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .sub { fill: #475569; font: 13px Arial, sans-serif; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .note { fill: #334155; font: 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="520"/>

  <rect class="group" x="24" y="32" width="278" height="190"/>
  <text class="group-title" x="48" y="62">User Surface</text>
  <rect class="box box-blue" x="56" y="88" width="210" height="48"/>
  <text class="label" x="161" y="109" text-anchor="middle">User</text>
  <text class="sub" x="161" y="126" text-anchor="middle">login or QR scan</text>
  <rect class="box box-blue" x="56" y="156" width="210" height="48"/>
  <text class="label" x="161" y="177" text-anchor="middle">Settings UI</text>
  <text class="sub" x="161" y="194" text-anchor="middle">modal with browser stream</text>

  <rect class="group" x="362" y="32" width="246" height="190"/>
  <text class="group-title" x="386" y="62">Application API</text>
  <rect class="box box-green" x="392" y="88" width="186" height="48"/>
  <text class="label" x="485" y="109" text-anchor="middle">Backend API</text>
  <text class="sub" x="485" y="126" text-anchor="middle">auth, session records</text>
  <rect class="box box-green" x="392" y="156" width="186" height="48"/>
  <text class="label" x="485" y="177" text-anchor="middle">Stream Proxy</text>
  <text class="sub" x="485" y="194" text-anchor="middle">token-protected WebSocket</text>

  <rect class="group" x="674" y="32" width="226" height="190"/>
  <text class="group-title" x="698" y="62">Browser Worker</text>
  <rect class="box box-amber" x="704" y="88" width="166" height="48"/>
  <text class="label" x="787" y="109" text-anchor="middle">Session Manager</text>
  <text class="sub" x="787" y="126" text-anchor="middle">TTL, locks, cleanup</text>
  <rect class="box box-amber" x="704" y="156" width="166" height="48"/>
  <text class="label" x="787" y="177" text-anchor="middle">CDP Client</text>
  <text class="sub" x="787" y="194" text-anchor="middle">detect and capture cookies</text>

  <rect class="group" x="960" y="32" width="196" height="300"/>
  <text class="group-title" x="984" y="62">Ephemeral Container</text>
  <rect class="box box-red" x="982" y="88" width="152" height="48"/>
  <text class="label" x="1058" y="109" text-anchor="middle">Chromium</text>
  <text class="sub" x="1058" y="126" text-anchor="middle">isolated profile</text>
  <rect class="box box-red" x="982" y="156" width="152" height="48"/>
  <text class="label" x="1058" y="177" text-anchor="middle">CDP Port</text>
  <text class="sub" x="1058" y="194" text-anchor="middle">private network only</text>
  <rect class="box box-red" x="982" y="224" width="152" height="48"/>
  <text class="label" x="1058" y="245" text-anchor="middle">noVNC</text>
  <text class="sub" x="1058" y="262" text-anchor="middle">stream endpoint</text>

  <rect class="group" x="356" y="370" width="548" height="106"/>
  <text class="group-title" x="380" y="400">Data Boundary</text>
  <rect class="box box-green" x="392" y="422" width="190" height="38"/>
  <text class="label" x="487" y="445" text-anchor="middle">PostgreSQL</text>
  <rect class="box box-green" x="646" y="422" width="220" height="38"/>
  <text class="label" x="756" y="445" text-anchor="middle">Encrypted Cookie Store</text>

  <path class="arrow" d="M161 136 L161 151"/>
  <path class="arrow" d="M266 180 C304 180, 344 112, 386 112"/>
  <path class="arrow" d="M578 112 C620 112, 658 112, 698 112"/>
  <path class="arrow" d="M870 112 C908 112, 936 112, 976 112"/>
  <path class="arrow" d="M787 136 L787 151"/>
  <path class="arrow" d="M870 180 C918 180, 928 180, 976 180"/>
  <path class="arrow" d="M1058 136 L1058 151"/>
  <path class="arrow-dashed" d="M982 248 C846 248, 610 248, 489 200"/>
  <path class="arrow" d="M485 136 L485 416"/>
  <path class="arrow" d="M787 204 L787 416"/>
  <path class="arrow" d="M582 441 L640 441"/>
  <path class="arrow-dashed" d="M704 180 C646 208, 596 212, 512 200"/>

  <text class="note" x="600" y="103">start/get/complete/cancel</text>
  <text class="note" x="894" y="171">private CDP</text>
  <text class="note" x="624" y="262">authenticated stream proxy</text>
  <text class="note" x="497" y="344">session rows, active-session lock, audit events</text>
  <text class="note" x="797" y="344">decrypt only inside trusted service boundary</text>
</svg>
