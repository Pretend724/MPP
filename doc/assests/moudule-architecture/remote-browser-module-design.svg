<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720" role="img">

  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .section-title { font-size: 14px; font-weight: 700; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-line { font-size: 12px; fill: #6b7280; }
    .edge-label { font-size: 11px; font-weight: 600; fill: #374151; }
    .section { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.4; stroke-dasharray: 7 5; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .gray { fill: #f9fafb; stroke: #d1d5db; }
    .request { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
    .data { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
    .async { stroke: #dc2626; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-red); }
    .ai { stroke: #9333ea; stroke-width: 2.2; fill: none; marker-end: url(#arrow-purple); }
    .browser { stroke: #ea580c; stroke-width: 2.2; fill: none; marker-end: url(#arrow-orange); }
    .muted { stroke: #9ca3af; stroke-width: 1.8; fill: none; marker-end: url(#arrow-gray); }
  </style>


  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="40" y="44" class="title">Remote Browser Session Module Design</text>
  <text x="40" y="68" class="subtitle">Cookie-based platform connections use an isolated browser container, proxied streams, and encrypted cookie storage.</text>
  <rect x="40" y="105" width="310" height="545" rx="14" class="section"/>
  <text x="62" y="135" class="section-title">Frontend auth page</text>
  <rect x="390" y="105" width="360" height="545" rx="14" class="section"/>
  <text x="412" y="135" class="section-title">Backend session control</text>
  <rect x="790" y="105" width="450" height="545" rx="14" class="section"/>
  <text x="812" y="135" class="section-title">Worker and runtime</text>
  <rect x="75" y="165" width="240" height="100" rx="10" class="node orange"/>
  <text x="99" y="196" class="node-title">Platform account card</text>
  <text x="99" y="218" class="node-line">Connect button</text>
  <text x="99" y="236" class="node-line">Session polling</text>
  <text x="99" y="254" class="node-line">Complete/cancel actions</text>
  <rect x="75" y="325" width="240" height="110" rx="10" class="node blue"/>
  <text x="99" y="356" class="node-title">Remote modal</text>
  <text x="99" y="378" class="node-line">Loads stream_url</text>
  <text x="99" y="396" class="node-line">noVNC iframe</text>
  <text x="99" y="414" class="node-line">User signs in</text>
  <rect x="420" y="145" width="290" height="105" rx="10" class="node purple"/>
  <text x="444" y="176" class="node-title">StartSession API</text>
  <text x="444" y="198" class="node-line">Validate JWT</text>
  <text x="444" y="216" class="node-line">Create DB row</text>
  <text x="444" y="234" class="node-line">Generate stream token</text>
  <rect x="420" y="300" width="290" height="105" rx="10" class="node green"/>
  <text x="444" y="331" class="node-title">BrowserSessionService</text>
  <text x="444" y="353" class="node-line">Adapter login URL</text>
  <text x="444" y="371" class="node-line">Worker client request</text>
  <text x="444" y="389" class="node-line">Status transitions</text>
  <rect x="420" y="465" width="290" height="110" rx="10" class="node red"/>
  <text x="444" y="496" class="node-title">CookieStore</text>
  <text x="444" y="518" class="node-line">Capture response</text>
  <text x="444" y="536" class="node-line">AES-256-GCM envelope</text>
  <text x="444" y="554" class="node-line">PlatformAccount update</text>
  <rect x="825" y="145" width="360" height="125" rx="10" class="node orange"/>
  <image href="icons/go.svg" xlink:href="icons/go.svg" x="849" y="163" width="26" height="26"/>
  <image href="icons/docker.svg" xlink:href="icons/docker.svg" x="885" y="163" width="26" height="26"/>
  <text x="849" y="203" class="node-title">browser-worker service</text>
  <text x="849" y="225" class="node-line">Create session container</text>
  <text x="849" y="243" class="node-line">Track worker_session_ref</text>
  <text x="849" y="261" class="node-line">TTL cleanup</text>
  <rect x="825" y="300" width="360" height="125" rx="10" class="node teal"/>
  <image href="icons/chromium.svg" xlink:href="icons/chromium.svg" x="849" y="318" width="26" height="26"/>
  <text x="849" y="358" class="node-title">Runtime container</text>
  <text x="849" y="380" class="node-line">Chromium + CDP</text>
  <text x="849" y="398" class="node-line">Xvfb + x11vnc</text>
  <text x="849" y="416" class="node-line">websockify + noVNC</text>
  <rect x="825" y="470" width="360" height="105" rx="10" class="node purple"/>
  <text x="849" y="501" class="node-title">Capture endpoint</text>
  <text x="849" y="523" class="node-line">Read cookies via CDP</text>
  <text x="849" y="541" class="node-line">Extract account profile</text>
  <text x="849" y="559" class="node-line">Stop container after success</text>
  <path d="M315 215 L420 198" class="request"/>
  <rect x="338" y="176" width="58" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="348" y="192" class="edge-label">start</text>
  <path d="M565 250 L565 300" class="data"/>
  <rect x="580" y="268" width="97" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="590" y="284" class="edge-label">session row</text>
  <path d="M710 350 L825 195" class="browser"/>
  <rect x="730" y="244" width="90" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="740" y="260" class="edge-label">worker API</text>
  <path d="M1005 270 L1005 300" class="browser"/>
  <rect x="1020" y="269" width="111" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="1030" y="285" class="edge-label">start runtime</text>
  <path d="M420 360 L315 380" class="browser"/>
  <rect x="336" y="342" width="104" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="346" y="358" class="edge-label">stream proxy</text>
  <path d="M315 380 L420 520" class="request"/>
  <rect x="340" y="446" width="76" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="350" y="462" class="edge-label">complete</text>
  <path d="M710 505 L825 505" class="browser"/>
  <rect x="735" y="478" width="69" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="745" y="494" class="edge-label">capture</text>
  <path d="M825 545 L710 545" class="data"/>
  <rect x="735" y="552" width="69" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="745" y="568" class="edge-label">cookies</text>
</svg>
