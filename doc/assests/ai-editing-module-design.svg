<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720" role="img">

  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .section-title { font-size: 14px; font-weight: 700; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-line { font-size: 12px; fill: #6b7280; }
    .edge-label { font-size: 11px; font-weight: 600; fill: #374151; }
    .section { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.4; stroke-dasharray: 7 5; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .gray { fill: #f9fafb; stroke: #d1d5db; }
    .request { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
    .data { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
    .async { stroke: #dc2626; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-red); }
    .ai { stroke: #9333ea; stroke-width: 2.2; fill: none; marker-end: url(#arrow-purple); }
    .browser { stroke: #ea580c; stroke-width: 2.2; fill: none; marker-end: url(#arrow-orange); }
    .muted { stroke: #9ca3af; stroke-width: 1.8; fill: none; marker-end: url(#arrow-gray); }
  </style>


  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="40" y="44" class="title">AI Editing Module Design</text>
  <text x="40" y="68" class="subtitle">Streaming edits flow from React widgets through the Go backend into FastAPI and back as reviewable proposals.</text>
  <rect x="40" y="105" width="360" height="545" rx="14" class="section"/>
  <text x="62" y="135" class="section-title">Frontend review loop</text>
  <rect x="460" y="105" width="330" height="545" rx="14" class="section"/>
  <text x="482" y="135" class="section-title">Backend proxy</text>
  <rect x="850" y="105" width="390" height="545" rx="14" class="section"/>
  <text x="872" y="135" class="section-title">AI service</text>
  <rect x="75" y="165" width="290" height="125" rx="10" class="node purple"/>
  <image href="icons/react.svg" xlink:href="icons/react.svg" x="99" y="183" width="26" height="26"/>
  <text x="99" y="223" class="node-title">AIEditAssistant</text>
  <text x="99" y="245" class="node-line">Prompt textarea</text>
  <text x="99" y="263" class="node-line">Abort controller</text>
  <text x="99" y="281" class="node-line">Preview / diff tabs</text>
  <rect x="75" y="330" width="290" height="110" rx="10" class="node green"/>
  <text x="99" y="361" class="node-title">Apply boundary</text>
  <text x="99" y="383" class="node-line">Accept writes proposal</text>
  <text x="99" y="401" class="node-line">Reject clears proposal</text>
  <text x="99" y="419" class="node-line">No direct DB write here</text>
  <rect x="495" y="180" width="260" height="130" rx="10" class="node blue"/>
  <image href="icons/typescript.svg" xlink:href="icons/typescript.svg" x="519" y="198" width="26" height="26"/>
  <text x="519" y="238" class="node-title">streamDashboardText</text>
  <text x="519" y="260" class="node-line">Fetch with auth token</text>
  <text x="519" y="278" class="node-line">ReadableStream reader</text>
  <text x="519" y="296" class="node-line">Chunk accumulation</text>
  <rect x="495" y="345" width="260" height="125" rx="10" class="node purple"/>
  <image href="icons/go.svg" xlink:href="icons/go.svg" x="519" y="363" width="26" height="26"/>
  <text x="519" y="403" class="node-title">Go AI proxy routes</text>
  <text x="519" y="425" class="node-line">Access control via JWT</text>
  <text x="519" y="443" class="node-line">Project or draft context</text>
  <text x="519" y="461" class="node-line">Streams response body</text>
  <rect x="885" y="145" width="290" height="125" rx="10" class="node purple"/>
  <image href="icons/fastapi.svg" xlink:href="icons/fastapi.svg" x="909" y="163" width="26" height="26"/>
  <image href="icons/python.svg" xlink:href="icons/python.svg" x="945" y="163" width="26" height="26"/>
  <text x="909" y="203" class="node-title">FastAPI routes</text>
  <text x="909" y="225" class="node-line">/content/edit/stream</text>
  <text x="909" y="243" class="node-line">/prepublish/edit/stream</text>
  <text x="909" y="261" class="node-line">/calibrate</text>
  <rect x="885" y="295" width="290" height="125" rx="10" class="node orange"/>
  <image href="icons/langchain.svg" xlink:href="icons/langchain.svg" x="909" y="313" width="26" height="26"/>
  <text x="909" y="353" class="node-title">Prompt builders</text>
  <text x="909" y="375" class="node-line">System instructions</text>
  <text x="909" y="393" class="node-line">Conversation history</text>
  <text x="909" y="411" class="node-line">Format preservation</text>
  <rect x="885" y="455" width="290" height="125" rx="10" class="node gray"/>
  <image href="icons/openai.svg" xlink:href="icons/openai.svg" x="909" y="473" width="26" height="26"/>
  <text x="909" y="513" class="node-title">ChatOpenAI provider</text>
  <text x="909" y="535" class="node-line">Provider URL, model, key</text>
  <text x="909" y="553" class="node-line">astream chunks</text>
  <text x="909" y="571" class="node-line">Markdown/plain text output</text>
  <path d="M365 220 L495 230" class="ai"/>
  <rect x="382" y="196" width="118" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="392" y="212" class="edge-label">stream request</text>
  <path d="M625 310 L625 345" class="request"/>
  <rect x="640" y="304" width="111" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="650" y="320" class="edge-label">backend route</text>
  <path d="M755 395 L885 195" class="ai"/>
  <rect x="784" y="270" width="69" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="794" y="286" class="edge-label">forward</text>
  <path d="M1030 270 L1030 295" class="request"/>
  <rect x="1045" y="266" width="76" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="1055" y="282" class="edge-label">messages</text>
  <path d="M1030 420 L1030 455" class="ai"/>
  <rect x="1045" y="426" width="76" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="1055" y="442" class="edge-label">LLM call</text>
  <path d="M885 507 L755 397" class="ai"/>
  <rect x="800" y="458" width="62" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="810" y="474" class="edge-label">chunks</text>
  <path d="M495 395 L365 220" class="ai"/>
  <rect x="392" y="320" width="76" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="402" y="336" class="edge-label">proposal</text>
  <path d="M220 275 L220 330" class="data"/>
  <rect x="238" y="292" width="62" height="22" rx="11" fill="#ffffff" opacity="0.96"/>
  <text x="248" y="308" class="edge-label">review</text>
</svg>
