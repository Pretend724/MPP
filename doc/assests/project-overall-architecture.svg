  <text x="1305" y="338" class="node-subtitle">users, projects, publications</text>
  <text x="1305" y="358" class="node-subtitle">platform_accounts</text>
  <text x="1305" y="376" class="node-subtitle">browser_sessions</text>
  <text x="1305" y="394" class="node-subtitle">GORM AutoMigrate + dev seed</text>

  <rect x="1280" y="430" width="250" height="112" rx="10" class="node red"/>
