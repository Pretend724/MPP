<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 1100" width="1600" height="1100" role="img" aria-labelledby="title desc">
  <title id="title">MPP project overall architecture</title>
  <desc id="desc">Overall architecture for multi-platform-poster, showing the Next.js frontend, Go backend, FastAPI AI service, browser worker, PostgreSQL, Redis, Docker runtime, and publishing platform integrations with real SVG technology icons.</desc>
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
      fill: #111827;
    }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #6b7280; }
    .section-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .section-note { font-size: 11px; fill: #6b7280; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-subtitle { font-size: 12px; fill: #6b7280; }
    .node-small { font-size: 11px; fill: #6b7280; }
    .chip-label { font-size: 11px; font-weight: 600; fill: #374151; }
    .edge-label { font-size: 11px; font-weight: 600; fill: #374151; }
    .legend { font-size: 12px; fill: #6b7280; }
    .section {
      fill: #ffffff;
      stroke: #d1d5db;
      stroke-width: 1.5;
      stroke-dasharray: 7 5;
    }
    .node {
      fill: #ffffff;
      stroke: #d1d5db;
      stroke-width: 1.5;
    }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .gray { fill: #f9fafb; stroke: #d1d5db; }
    .chip {
      fill: #ffffff;
      stroke: #e5e7eb;
      stroke-width: 1;
    }
    .arrow-request { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
    .arrow-data { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
    .arrow-ai { stroke: #9333ea; stroke-width: 2.2; fill: none; marker-end: url(#arrow-purple); }
    .arrow-browser { stroke: #ea580c; stroke-width: 2.2; fill: none; marker-end: url(#arrow-orange); }
    .arrow-async { stroke: #dc2626; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-red); }
    .arrow-muted { stroke: #9ca3af; stroke-width: 1.8; fill: none; marker-end: url(#arrow-gray); }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1600" height="1100" fill="#ffffff"/>

  <image href="mpp-with-name.svg" xlink:href="mpp-with-name.svg" x="42" y="26" width="165" height="60" preserveAspectRatio="xMidYMid meet"/>
  <text x="232" y="48" class="title">MPP Overall Architecture</text>
  <text x="232" y="73" class="subtitle">Next.js workspace for creation and prepublish; Go backend handles auth, projects, queues, and remote browser sessions.</text>
  <text x="232" y="94" class="subtitle">FastAPI AI Service streams content and prepublish editing suggestions.</text>

  <g transform="translate(0,-60)">

  <rect x="40" y="190" width="345" height="580" rx="14" class="section"/>
  <text x="62" y="220" class="section-title">Frontend / User Workspace</text>
  <text x="62" y="239" class="section-note">frontend - Next.js App Router - React 19</text>

  <rect x="70" y="260" width="285" height="72" rx="10" class="node blue"/>
  <text x="96" y="291" class="node-title">Creator / Operator</text>
  <text x="96" y="313" class="node-subtitle">Dashboard, login, auth, publishing</text>

  <rect x="70" y="360" width="285" height="120" rx="10" class="node"/>
  <image href="icons/nextdotjs.svg" xlink:href="icons/nextdotjs.svg" x="95" y="382" width="28" height="28"/>
  <image href="icons/react.svg" xlink:href="icons/react.svg" x="133" y="382" width="28" height="28"/>
  <image href="icons/typescript.svg" xlink:href="icons/typescript.svg" x="171" y="382" width="28" height="28"/>
  <text x="96" y="431" class="node-title">Dashboard &amp; Content Workspace</text>
  <text x="96" y="453" class="node-subtitle">Projects, editor, previews, publish panel</text>

  <rect x="70" y="510" width="285" height="88" rx="10" class="node teal"/>
  <image href="icons/tailwindcss.svg" xlink:href="icons/tailwindcss.svg" x="95" y="532" width="26" height="26"/>
  <image href="icons/shadcnui.svg" xlink:href="icons/shadcnui.svg" x="132" y="532" width="26" height="26"/>
  <text x="96" y="575" class="node-title">UI Components &amp; Editor</text>
  <text x="96" y="591" class="node-small">Tailwind CSS 4 - shadcn/ui - TipTap</text>

  <rect x="70" y="628" width="285" height="104" rx="10" class="node orange"/>
  <text x="96" y="660" class="node-title">Next API Proxy &amp; Remote Modal</text>
  <text x="96" y="682" class="node-subtitle">Injects Authorization from cookies</text>
  <text x="96" y="704" class="node-subtitle">Embeds noVNC browser stream</text>

  <rect x="420" y="190" width="440" height="580" rx="14" class="section"/>
  <text x="442" y="220" class="section-title">Backend API / Core Domain</text>
  <text x="442" y="239" class="section-note">backend - Go 1.26 - Echo - GORM - JWT</text>

  <rect x="450" y="260" width="380" height="88" rx="10" class="node blue"/>
