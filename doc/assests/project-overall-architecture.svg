  <text x="530" y="316" class="node-subtitle">/api/user/dashboard, /api/admin/dashboard</text>
  <text x="530" y="334" class="node-subtitle">/api/browser-stream reverse proxy</text>

  <rect x="450" y="378" width="180" height="98" rx="10" class="node"/>
  <text x="474" y="410" class="node-title">Auth &amp; Accounts</text>
  <text x="474" y="432" class="node-subtitle">JWT middleware</text>
  <text x="474" y="452" class="node-subtitle">Accounts, OAuth2, cookies</text>

  <rect x="650" y="378" width="180" height="98" rx="10" class="node green"/>
  <text x="674" y="410" class="node-title">Dashboard Service</text>
  <text x="674" y="432" class="node-subtitle">projects / publications</text>
  <text x="674" y="452" class="node-subtitle">prepublish sync / status</text>

  <rect x="450" y="508" width="180" height="108" rx="10" class="node red"/>
  <image href="icons/redis.svg" xlink:href="icons/redis.svg" x="474" y="532" width="28" height="28"/>
  <text x="514" y="539" class="node-title">Publish Worker</text>
  <text x="474" y="580" class="node-subtitle">Redis BLPOP queue</text>
  <text x="474" y="600" class="node-subtitle">Locks, retry, status updates</text>

  <rect x="650" y="508" width="180" height="108" rx="10" class="node orange"/>
  <text x="674" y="540" class="node-title">Publisher Factory</text>
  <text x="674" y="562" class="node-subtitle">wechat, x</text>
  <text x="674" y="582" class="node-subtitle">zhihu, douyin</text>
  <text x="674" y="602" class="node-subtitle">Adapt + publish</text>

  <rect x="450" y="646" width="380" height="84" rx="10" class="node purple"/>
  <image href="icons/docker.svg" xlink:href="icons/docker.svg" x="475" y="670" width="28" height="28"/>
