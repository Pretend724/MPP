  <text x="520" y="700" class="node-subtitle">Creates remote login sessions</text>
  <text x="520" y="718" class="node-subtitle">Validates stream token and stores cookies</text>

  <rect x="895" y="190" width="320" height="580" rx="14" class="section"/>
  <text x="917" y="220" class="section-title">AI Service &amp; Browser Worker</text>
  <text x="917" y="239" class="section-note">ai-service + browser-worker isolated boundary</text>

