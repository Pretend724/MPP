  <text x="1305" y="508" class="node-subtitle">mpp:publish:jobs queue</text>
  <text x="1305" y="528" class="node-subtitle">mpp:publish:lock:* locks</text>

  <rect x="1280" y="580" width="250" height="116" rx="10" class="node orange"/>
